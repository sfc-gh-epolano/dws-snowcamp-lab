version: 2

sources:
  - name: raw
    database: SNOWCAMP_LAB
    schema: RAW
    description: "Raw synthetic asset management data generated in the SnowCamp lab"
    tables:
      - name: clients
        description: "Institutional clients with region and AUM classification"
      - name: portfolios
        description: "Investment portfolios linked to clients"
      - name: securities
        description: "Tradeable securities with sector and asset class"
      - name: holdings
        description: "Daily portfolio holdings (position-level)"
      - name: transactions
        description: "Trade executions (buys and sells)"
      - name: benchmarks
        description: "Daily benchmark index returns"

  - name: cybersyn
    database: FINANCIAL__ECONOMIC_ESSENTIALS
    schema: PUBLIC_DATA_FREE
    description: "Cybersyn Financial & Economic Essentials (Snowflake Marketplace - free)"
    tables:
      - name: stock_price_timeseries
        description: "NASDAQ stock prices (open, close, high, low, volume) for all US equities and ETFs"
